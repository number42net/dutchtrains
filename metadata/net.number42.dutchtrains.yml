AutoName: DutchTrains
Summary: Check NS train departures and follow live train journeys.
Description: |
  DutchTrains is a commuter-focused app for Dutch rail travel.

  Features include:
  . Trip planning between Dutch stations
  . Platform and delay monitoring
  . Train composition and length details
  . Live trip following with notifications
  . Nearest station detection via GPS

  For live NS data, users provide their own NS API key in-app.

